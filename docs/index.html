<!DOCTYPE html>

  <div id="login-view" class="auth-page">

          <input class="field-input" id="login-pass" type="password" value="Nadee@123" required>

  <div id="app-shell" class="hidden">

      <a class="brand" href="#home">

        <a href="#about" data-nav="about">عن المنصة</a>
        <button type="button" id="logout-btn" class="btn btn-ghost" style="padding:0.35rem 0.8rem;font-size:0.9rem;">خروج</button>
      </nav>
    </header>

    <main id="page"></main>
  </div>

  <script src="./js/app.js"></script>
