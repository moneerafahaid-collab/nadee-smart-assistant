services:
  - type: web
    name: nadee-smart-assistant
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && python manage.py seed_nadee && gunicorn nadee_platform.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
